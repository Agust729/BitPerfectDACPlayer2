name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses and install Android SDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Unzip project
        run: |
          mkdir source
          unzip -q BitPerfectDACPlayer_fixed.zip -d source
          PROJECT_DIR=$(find source -name "settings.gradle.kts" -exec dirname {} \; | head -n 1)
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Project found at: $PROJECT_DIR"

      - name: Force Java and Kotlin 17
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          p = Path("app/build.gradle.kts")
          s = p.read_text()

          if "compileOptions" not in s:
              s = s.replace(
                  '    compileSdk = 35',
                  '''    compileSdk = 35

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }'''
              )

          if "kotlinOptions" not in s:
              s = s.replace(
                  '    defaultConfig {',
                  '''    kotlinOptions {
                  jvmTarget = "17"
              }

              defaultConfig {'''
              )

          p.write_text(s)
          print(p.read_text())
          PY

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build debug APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BitPerfectDACPlayer-debug-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
